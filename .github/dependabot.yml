version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Asia/Manila
    open-pull-requests-limit: 5
    groups:
      # Group minor/patch updates to reduce PR noise
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # Major version bumps require manual review
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
    labels:
      - dependencies
    commit-message:
      prefix: "chore"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
    commit-message:
      prefix: "chore"
