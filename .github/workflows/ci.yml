name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Required for `next build` (page data collection / auth without real DB)
      MONGODB_URI: mongodb://127.0.0.1:27017/ci-build-placeholder
      AUTH_SECRET: ci-build-placeholder-secret-min-32-chars-long
      AUTH_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Production build
        run: npm run build
